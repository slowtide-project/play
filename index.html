<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#0b0d1a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Slowtide</title>
    <style>
      /* Safe-area insets, exposed as variables so both CSS and JS (via a probe)
         can respect the Dynamic Island / home indicator on notched devices.
         viewport-fit=cover (see the viewport meta) is what makes these non-zero. */
      :root {
        --safe-top: env(safe-area-inset-top, 0px);
        --safe-right: env(safe-area-inset-right, 0px);
        --safe-bottom: env(safe-area-inset-bottom, 0px);
        --safe-left: env(safe-area-inset-left, 0px);
      }
      html,
      body {
        margin: 0;
        height: 100%;
        /* On iOS standalone with a black-translucent status bar, iOS reserves the
           bottom home-indicator inset and will not composite web content there;
           that region shows this page background instead. So we keep it matched to
           the scene's bottom edge (updated live from JS) to hide the seam. This
           warm dark is the starting value for the rest surface before play. */
        background: hsl(24 22% 4%);
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
      }
      /* The child surface fills the layout viewport; the canvas is positioned
         within it and draws full-bleed. The bottom home-indicator inset that iOS
         will not paint into is covered by the matched page background above. */
      #app {
        position: fixed;
        inset: 0;
      }
    </style>
  </head>
  <body>
    <main id="app" aria-hidden="true"></main>
    <script type="module" src="/src/app.ts"></script>
  </body>
</html>
