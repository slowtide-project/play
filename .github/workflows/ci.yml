name: CI

# Quality gate. Runs the full verify gate on every pull request and on pushes
# to main. Deployment to GitHub Pages is handled separately by deploy.yml.
# Paths are root-relative because play/ is the repository root.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run verify
