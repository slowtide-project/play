name: Deploy to GitHub Pages

# play/ is the repository root of the public repo, so all paths here are
# root-relative. On push to main this builds the PWA and publishes dist/ to
# GitHub Pages; the custom domain is set by public/CNAME (copied into dist by
# Vite). On a public repo, GitHub Pages is free.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test
      - run: npm run build
      - uses: actions/configure-pages@v6
        with:
          # Enable the Pages site via the API on first run, so the workflow
          # does not 404 when Pages has not been turned on in Settings yet.
          enablement: true
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
