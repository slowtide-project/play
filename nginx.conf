server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # The service worker and its registrar must never be cached, so updates
    # propagate immediately (offline behaviour still comes from the SW cache).
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache";
    }

    # Correct MIME type for the web manifest.
    location = /manifest.webmanifest {
        default_type application/manifest+json;
    }

    # Single-page app: fall back to index.html for unknown routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
